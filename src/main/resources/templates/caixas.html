<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Caixas</title><link rel="stylesheet" href="/css/app.css"></head>
<body><header class="top"><div class="brand">Mercado do Tonico</div><nav class="nav"><a href="/">Dashboard</a><a href="/logout">Sair</a></nav></header>
<main class="wrap"><h1>Caixas</h1>
<div th:if="${flash}" class="flash" th:text="${flash}"></div>
<div th:if="${session.fechamento}" class="flash">Fechamento registrado. Diferenca: <b th:text="${@formatService.dinheiro(session.fechamento.diferenca)}"></b></div>
<div class="grid">
  <section class="card" th:each="c: ${caixas}">
    <h2 th:text="'Caixa ' + ${c.numero}"></h2>
    <p>Status: <b th:text="${c.status}"></b></p>
    <p>Operador: <b th:text="${c.operador_nome ?: '-'}"></b></p>
    <form method="post" action="/caixa/abrir">
      <input type="hidden" name="numero" th:value="${c.numero}">
      <label>Fundo de caixa<input name="fundo" type="number" step="0.01" value="100.00"></label>
      <button>Abrir/Entrar</button>
    </form>
  </section>
</div></main></body></html>
