<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Fornecedores</title><link rel="stylesheet" href="/css/app.css"></head>
<body><header class="top"><div class="brand">Mercado do Tonico</div><nav class="nav"><a href="/">Dashboard</a><a href="/estoque">Estoque</a><a href="/xml">XML</a></nav></header>
<main class="wrap"><div th:if="${flash}" class="flash" th:text="${flash}"></div><h1>Fornecedores</h1>
<section class="card"><form method="post" action="/fornecedores" class="row">
  <label>Razao social<input name="razao_social" required></label><label>Nome fantasia<input name="nome_fantasia"></label>
  <label>CNPJ<input id="cnpj" name="cnpj" placeholder="Somente numeros"></label><button type="button" onclick="buscarCnpj()">Buscar CNPJ</button><label>Telefone<input name="telefone"></label>
  <label>Email<input name="email"></label><label>Endereco<input name="endereco"></label><label>Contato<input name="contato"></label><button>Salvar</button>
</form></section>
<table><tr><th>Razao social</th><th>Fantasia</th><th>CNPJ</th><th>Telefone</th><th>Email</th><th>Contato</th></tr>
<tr th:each="f: ${fornecedores}"><td th:text="${f.razao_social}"></td><td th:text="${f.nome_fantasia}"></td><td th:text="${f.cnpj}"></td><td th:text="${f.telefone}"></td><td th:text="${f.email}"></td><td th:text="${f.contato}"></td></tr>
</table>
<script>
async function buscarCnpj() {
  const cnpj = document.getElementById('cnpj').value;
  if (!cnpj) return;
  const resposta = await fetch('/fornecedores/cnpj?cnpj=' + encodeURIComponent(cnpj));
  if (!resposta.ok) return;
  const fornecedor = await resposta.json();
  for (const [campo, valor] of Object.entries(fornecedor)) {
    const input = document.querySelector('[name="' + campo + '"]');
    if (input && !input.value) input.value = valor || '';
  }
}
</script></main></body></html>
