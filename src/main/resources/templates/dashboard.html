<!doctype html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Mercado do Tonico</title><link rel="stylesheet" href="/css/app.css"></head>
<body>
<header class="top">
  <div class="brand">Mercado do Tonico</div>
  <nav class="nav">
    <a th:if="${usuario != null and (#strings.equals(usuario.role, 'ADMIN') or #strings.equals(usuario.role, 'GERENTE') or #strings.equals(usuario.role, 'CAIXA'))}" href="/caixa">Caixas</a>
    <a th:if="${usuario != null and (#strings.equals(usuario.role, 'ADMIN') or #strings.equals(usuario.role, 'GERENTE') or #strings.equals(usuario.role, 'ESTOQUE'))}" href="/estoque">Estoque</a>
    <a th:if="${usuario != null and (#strings.equals(usuario.role, 'ADMIN') or #strings.equals(usuario.role, 'GERENTE') or #strings.equals(usuario.role, 'ESTOQUE'))}" href="/fornecedores">Fornecedores</a>
    <a th:if="${usuario != null and (#strings.equals(usuario.role, 'ADMIN') or #strings.equals(usuario.role, 'GERENTE') or #strings.equals(usuario.role, 'ESTOQUE'))}" href="/xml">Importar XML</a>
    <a th:if="${usuario != null and (#strings.equals(usuario.role, 'ADMIN') or #strings.equals(usuario.role, 'GERENTE') or #strings.equals(usuario.role, 'CAIXA'))}" href="/fiado">Fiado</a>
    <a th:if="${usuario != null and (#strings.equals(usuario.role, 'ADMIN') or #strings.equals(usuario.role, 'GERENTE'))}" href="/relatorios">Relatorios</a>
    <a href="/logout">Sair</a>
  </nav>
</header>
<main class="wrap">
  <div th:if="${flash}" class="flash" th:text="${flash}"></div>
  <h1>Dashboard</h1>
  <div class="grid">
    <section class="card"><h2>Caixas</h2><table><tr><th>Caixa</th><th>Status</th><th>Operador</th></tr>
      <tr th:each="c: ${caixas}"><td th:text="${c.numero}"></td><td th:text="${c.status}"></td><td th:text="${c.operador_nome ?: '-'}"></td></tr>
    </table></section>
    <section class="card"><h2 class="red">Estoque baixo</h2><table><tr><th>Produto</th><th>Atual</th><th>Minimo</th></tr>
      <tr th:each="p: ${baixoEstoque}"><td th:text="${p.nome}"></td><td th:text="${p.estoque_atual}"></td><td th:text="${p.estoque_minimo}"></td></tr>
    </table></section>
    <section class="card"><h2 class="orange">Vencendo em 30 dias</h2><table><tr><th>Produto</th><th>Validade</th></tr>
      <tr th:each="p: ${vencendo}"><td th:text="${p.nome}"></td><td th:text="${p.validade}"></td></tr>
    </table></section>
    <section class="card"><h2>Fiado em aberto</h2><table><tr><th>Cliente</th><th>Valor</th></tr>
      <tr th:each="f: ${fiados}"><td th:text="${f.cliente_nome}"></td><td th:text="${@formatService.dinheiro(f.valor - f.valor_pago)}"></td></tr>
    </table></section>
  </div>
</main>
</body>
</html>
