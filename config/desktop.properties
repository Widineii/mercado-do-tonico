# =====================================================================
# Mercado do Tonico - Configuracao do app desktop
# =====================================================================
#
# 1) Caminho do banco de dados SQLite
#    Por padrao o app usa data/mercado-tonico.db (criado automaticamente).
#    Em modo cliente (caixa que aponta para o servidor), aponte para o
#    arquivo .db compartilhado via UNC, mapeamento de rede ou pasta.
#
#    Exemplos:
#      mercado.db.url=jdbc:sqlite:\\\\SERVIDOR\\mercado\\mercado-tonico.db
#      mercado.db.url=jdbc:sqlite:Z:/mercado/mercado-tonico.db
#      mercado.db.url=jdbc:sqlite:./data/mercado-tonico.db
#
#    A variavel de ambiente MERCADO_DB_URL tem prioridade sobre este arquivo.
mercado.db.url=

# =====================================================================
# 2) Cadastro automatico por codigo de barras (EAN/GTIN)
# =====================================================================
#
# O modulo "Cadastrar por codigo de barras" busca os dados do produto na
# seguinte ordem:
#   1. Banco local (tabela produtos)
#   2. Cache de consultas anteriores (tabela produto_lookup_cache)
#   3. APIs publicas externas:
#        - OpenFoodFacts: gratuita, nao precisa de chave (sempre ativa)
#        - Cosmos Bluesoft: precisa de token, fornece NCM/CEST/preco medio
#
# Token Cosmos Bluesoft (opcional). Cadastre-se em
#   https://cosmos.bluesoft.com.br/api  e cole abaixo o X-Cosmos-Token.
# Tambem pode ser definido via variavel de ambiente COSMOS_TOKEN
# (a variavel de ambiente tem prioridade sobre este arquivo).
#
# Exemplo:
#   cosmos.token=abcdef0123456789abcdef0123456789
cosmos.token=
